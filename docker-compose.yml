# docker-compose.yml
version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: report_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: report_app
    ports:
      - '3500:3500'
    environment:
      PORT: 3500
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 3600
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    driver: local